<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>CS-SE</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      font-family: Arial, sans-serif;
    }

    button {
      touch-action: manipulation;
    }

    #gameCanvas {
      display: block;
      touch-action: none;
    }

    #gearBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 20px;
      line-height: 38px;
      text-align: center;
      z-index: 60;
      pointer-events: auto;
      cursor: pointer;
    }

    #settingsPanel {
      position: fixed;
      top: 58px;
      left: 10px;
      width: 280px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      z-index: 61;
      display: none;
      pointer-events: auto;
    }

    #settingsPanel .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    #closeSettingsBtn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
    }

    #lobbyOverlay,
    #resultOverlay {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      pointer-events: auto;
    }

    #resultOverlay {
      display: none;
    }

    #lobbyPanel,
    #resultPanel {
      width: min(980px, 100%);
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      padding: 28px;
      box-sizing: border-box;
    }

    #lobbyTitle,
    #resultTitle {
      text-align: center;
      font-size: 34px;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
    }

    #lobbySubtitle,
    #resultSubtitle {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    #modeGrid {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .modeCard {
      flex: 1 1 320px;
      min-height: 220px;
      border: 1px solid #e6e6e6;
      border-radius: 22px;
      padding: 22px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #fafafa;
      max-width: 520px;
    }

    .modeCard h2 {
      margin: 0 0 10px 0;
      font-size: 26px;
      color: #111;
    }

    .modeCard p {
      margin: 0;
      color: #444;
      line-height: 1.6;
      font-size: 15px;
    }

    .modeCard .meta {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #eee;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    .enterBtn,
    .backBtn {
      margin-top: 18px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .backBtn {
      width: auto;
      min-width: 180px;
      display: block;
      margin: 0 auto;
    }

    #mobileControls {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      display: none;
    }

    #joystick {
      position: fixed;
      left: 14px;
      bottom: 14px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.10);
      pointer-events: auto;
      touch-action: none;
    }

    #joystickStick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 70px;
      height: 70px;
      margin-left: -35px;
      margin-top: -35px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.20);
      border: 2px solid rgba(255, 255, 255, 0.14);
      transform: translate(0px, 0px);
    }

    .mobileBtn {
      position: fixed;
      right: 18px;
      width: 92px;
      height: 92px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.10);
      border: 2px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      pointer-events: auto;
      touch-action: none;
    }

    #fireBtn {
      bottom: 18px;
    }

    #reloadBtn {
      bottom: 210px;
    }

    #jumpBtn {
      bottom: 114px;
    }

    #useBtn {
      bottom: 306px;
    }

    #hud {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #playerKillToast {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 12px;
      background: rgba(255, 245, 130, 0.95);
      color: #111;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(255, 240, 120, 0.55);
      display: none;
      pointer-events: none;
    }

    #killFeed {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 16px;
      pointer-events: auto;
      cursor: pointer;
      border-radius: 10px;
    }

    #ammoHud {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 16px;
      border-radius: 10px;
    }

    #scoreboard {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 240px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.92);
      color: #000;
      font-size: 16px;
      display: none;
      pointer-events: auto;
      border-radius: 14px;
    }

    @media (max-width: 640px) {
      #lobbyPanel,
      #resultPanel {
        padding: 22px;
        border-radius: 22px;
      }

      #lobbyTitle,
      #resultTitle {
        font-size: 28px;
      }

      .enterBtn,
      .backBtn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="lobbyOverlay">
    <div id="lobbyPanel">
      <div id="lobbyTitle">CS-SE</div>
      <div id="lobbySubtitle">现在专注做爆破模式原型：角色、武器、两层地图和梯子。</div>

      <div id="modeGrid">
        <div class="modeCard">
          <div>
            <h2>爆破模式</h2>
            <p>
              CT 与 T 在地图上对抗。<br>
              这一版先把人数、两层地图和梯子系统搭起来。
            </p>
            <div class="meta">
              特点：4 位 CT 队友，5 位 T 敌人，死亡后直接观战。
            </div>
          </div>
          <button id="battleEnterBtn" class="enterBtn">进入爆破模式</button>
        </div>
      </div>
    </div>
  </div>

  <div id="resultOverlay">
    <div id="resultPanel">
      <div id="resultTitle">结果</div>
      <div id="resultSubtitle">...</div>
      <button id="returnLobbyBtn" class="backBtn">返回大厅</button>
    </div>
  </div>

  <button id="gearBtn" aria-label="设置">⚙</button>

  <div id="settingsPanel">
    <div style="font-size:18px; margin-bottom:8px;">设置</div>

    <div class="row">
      <input type="checkbox" id="mobileModeCheckbox">
      <label for="mobileModeCheckbox">手机版</label>
    </div>

    <div style="font-size:13px; line-height:1.5; opacity:0.85;">
      手机版会显示左下角摇杆、右下角开火、换弹、跳跃和使用按钮。<br>
      E 键可以在梯子旁攀爬，离开梯子时则用于换弹。
    </div>

    <button id="closeSettingsBtn">退出设置</button>
  </div>

  <div id="mobileControls">
    <div id="joystick">
      <div id="joystickStick"></div>
    </div>

    <button id="useBtn" class="mobileBtn">E</button>
    <button id="jumpBtn" class="mobileBtn">跳</button>
    <button id="reloadBtn" class="mobileBtn">换弹</button>
    <button id="fireBtn" class="mobileBtn">开火</button>
  </div>

  <div id="hud">
    <div id="playerKillToast"></div>
    <div id="killFeed">击杀提示（点击查看排行榜）</div>
    <div id="ammoHud">30/30</div>
    <div id="scoreboard"></div>
  </div>

  <script src="map1.js"></script>
  <script src="AWbullet.js"></script>
  <script src="weapon.js"></script>
  <script src="bot.js"></script>
  <script src="player.js"></script>
  <script src="main.js"></script>
</body>
</html>
